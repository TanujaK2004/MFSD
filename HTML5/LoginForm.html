<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
</head>
<body>
    <h1>User Login</h1>
    <form>
        <!-- Username Field -->
        <label>Username:</label><br>
        <input type="text" name="username"><br><br>

        <!-- Password Field -->
        <label>Password:</label><br>
        <input type="password" name="password"><br><br>

        <!-- Submit Button -->
        <input type="submit" value="Login">
    </form>
</body>
</html>
