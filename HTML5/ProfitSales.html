<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Total Sales and Profit</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            margin: 20px;
            padding: 20px;
            text-align: center;
        }
        table {
            border-collapse: collapse; /* clean borders */
            width: 70%;
            margin: 30px auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            background-color: #fff;
        }
        th, td {
            border: 2px solid #2c3e50;
            padding: 12px;
            text-align: center;
            font-size: 15px;
        }
        th {
            background-color: #4a90e2; /* header background */
            color: #fff;
            font-weight: bold;
        }
        caption {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        tr:nth-child(even) {
            background-color: #f2f2f2; /* alternate row color */
        }
        tr:hover {
            background-color: #dff0ff; /* hover effect */
        }
    </style>
</head>
<body>
    <!-- Profit and Sales Table -->
    <table>
        <caption>Total Sales and Profit Report</caption>
        <tr>
            <th rowspan="2">Year</th>
            <th colspan="2">Sales</th>
            <th colspan="2">Profit</th>
        </tr>
        <tr>
            <th>Online</th>
            <th>Offline</th>
            <th>Online</th>
            <th>Offline</th>
        </tr>
        <tr>
            <td>2023</td>
            <td>50,000</td>
            <td>30,000</td>
            <td>15,000</td>
            <td>8,000</td>
        </tr>
        <tr>
            <td>2024</td>
            <td>65,000</td>
            <td>40,000</td>
            <td>20,000</td>
            <td>12,000</td>
        </tr>
        <tr>
            <th colspan="3">Total</th>
            <th colspan="2">55,000</th>
        </tr>
    </table>
</body>
</html>
