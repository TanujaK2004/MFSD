<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
            text-align: center;
            margin: 30px;
        }
        h1, h2 {
            color: #2c3e50;
        }
        img {
            width: 300px;     
            height: auto;
            border-radius: 15px;  
            border: 4px solid #333;
            margin: 20px 0;
        }
        a {
            color: #4a90e2;     
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
        }
        a:hover {
            color: #e74c3c;     
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>This page has an Image and Anchor Tag.</h1>
    <br><hr>
    <center>
        <h1>Flower Image</h1>
        <img src="../../Images/Flowers.avif" alt="Flowers">
        <h2>Visit a Website</h2>
        <a href="https://www.flowersofindia.net" 
           target="_blank" 
           title="Go to Flowers of India" 
           rel="noopener noreferrer">
           Click here
        </a>
    </center>
</body>
</html>
