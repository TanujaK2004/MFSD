<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Formatting</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.8; 
            margin: 20px;
            background-color: #f9f9f9;
            color: #333;
            text-align: center;
        }
        h1 {
            font-weight: bold; 
            text-decoration: underline; 
            letter-spacing: 3px; 
            color: #2c3e50;
        }
        h2 {
            font-weight: 600;
            color: #444;
            margin-top: 15px;
            letter-spacing: 2px;
        }
        p {
            font-size: 16px;
            line-height: 1.8;
            margin: 10px auto;
            width: 70%;
        }
        ul {
            list-style-type: square;
            text-align: left;
            margin: 0 auto;
            width: 50%;
            line-height: 1.8;
        }
        li {
            font-size: 15px;
            color: #555;
        }
        a {
            color: #4a90e2;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
            color: #e74c3c;
        }
    </style>
</head>
<body>
    <h1>Profile</h1><hr>
    <h1>Tanuja Kadam</h1>
    <h2>About Me</h2>

    <p>Hello! I am <strong><u>Tanuja Kadam</u></strong>, MCA student from KIT IMER Kolhpur.</p>
    <p>I enjoy the following hobbies:</p>
    <ul>
        <li><b>Reading</b> technical blogs</li>
        <li><i>Listening Music</i></li>
        <li><u>Traveling</u> to new places</li>
    </ul>

    <h2>Contact</h2>
    <p>You can reach me via email: <a href="mailto:johndoe@example.com">johndoe@example.com</a></p>
</body>
</html>
