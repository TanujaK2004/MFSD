<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce Product Page</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .product-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }
        /* Image Gallery */
        .product-images img {
            width: 100%;
            border-radius: 10px;
            margin-bottom: 10px;
        }
        /* Product Details */
        .product-details h2 {
            margin-top: 0;
        }
        .price {
            font-size: 24px;
            color: green;
            font-weight: bold;
        }
        .old-price {
            text-decoration: line-through;
            color: gray;
            margin-left: 10px;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            background: #2c3e50;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
        }
        .btn:hover {
            background: #1a252f;
        }
        /* Mobile View */
        @media (max-width: 768px) {
            .product-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<h1>Product Showcase</h1>
<div class="product-container">
    <!-- Image Gallery -->
    <div class="product-images">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?auto=format&w=800" alt="Smart Watch">
    </div>
    <!-- Product Details -->
    <div class="product-details">
        <h2>Smart Watch Pro X</h2>
        <p>Experience advanced fitness tracking, heart rate monitoring, and smart notifications with our latest smartwatch.</p>
        <p class="price">Rs.1499 <span class="old-price">Rs.1999</span></p>
        <p><strong>Features:</strong></p>
        <ul>
            <li>Heart Rate Monitor</li>
            <li>Water Resistant</li>
            <li>Bluetooth Calling</li>
            <li>7-Day Battery Life</li>
        </ul>
        <a href="#" class="btn">Add to Cart</a>
    </div>
</div>
</body>
</html>
