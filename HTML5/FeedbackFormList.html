<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
</head>
<body>
    <h1>Feedback Form</h1>
    <form>
        <!-- Feedback Options using Radio Buttons -->
        <h3>How would you rate our service?</h3>
        <input type="radio" name="rating"> Excellent<br>
        <input type="radio" name="rating"> Good<br>
        <input type="radio" name="rating"> Average<br>
        <input type="radio" name="rating"> Poor<br><br>
        <!-- Feedback Options using Checkboxes -->
        <h3>What did you like? (Select all that apply)</h3>
        <input type="checkbox" name="option1"> Quality of Service<br>
        <input type="checkbox" name="option2"> Friendly Staff<br>
        <input type="checkbox" name="option3"> Clean Environment<br>
        <input type="checkbox" name="option4"> Affordable Price<br><br>
        <!-- Submit Button -->
        <input type="submit" value="Submit Feedback">
    </form>
</body>
</html>
