<!DOCTYPE html>
<html>
<head>
<title>Grade</title>
</head>
<body>
<script>
let score = prompt("Enter your score");
if (score >= 90) {
    document.write("Grade A");
} else if (score >= 80) {
    document.write("Grade B");
} else if (score >= 70) {
    document.write("Grade C");
} else {
    document.write("Grade F");
}
</script>
</body>
</html>
