<!DOCTYPE html>
<html>
<head>
<title>Positive Negative or Zero</title>
</head>
<body>
<h3>Check Positive / Negative / Zero</h3>
<script>
let num = prompt("Enter a number");
if (num > 0) {
    document.write("Positive");
} else if (num < 0) {
    document.write("Negative");
} else {
    document.write("Zero");
}
</script>
</body>
</html>
