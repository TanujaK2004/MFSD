<!DOCTYPE html>
<html>
<head>
<title>Leap Year</title>
</head>
<body>
<script>
let year = prompt("Enter a year");
if ((year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0)) {
    document.write("Leap Year");
} else {
    document.write("Not a Leap Year");
}
</script>
</body>
</html>
