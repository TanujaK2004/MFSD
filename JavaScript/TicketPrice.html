<!DOCTYPE html>
<html>
<head>
<title>Ticket Price</title>
</head>
<body>
<script>
let age = prompt("Enter age");
let price;
if (age < 12) {
    price = 5;
}
else if (age <= 17) {
    price = 10;
}
else if (age <= 59) {
    price = 20;
}
else {
    price = 15;
}
document.write("Ticket Price = $" + price);
</script>
</body>
</html>
