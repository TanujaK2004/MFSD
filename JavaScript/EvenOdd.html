<!DOCTYPE html>
<html>
<head>
<title>Even Odd</title>
</head>
<body>
<script>
function isEven(n) {
    return n % 2 === 0;
}
let num = prompt("Enter a number");
if (isEven(num)) {
    document.write("Even Number");
} else {
    document.write("Odd Number");
}
</script>
</body>
</html>
