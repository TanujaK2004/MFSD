<!DOCTYPE html>
<html>
<head>
<title>Larger Number</title>
</head>
<body>
<script>
let a = prompt("Enter first number");
let b = prompt("Enter second number");
if (a > b) {
    document.write("Larger number is " + a);
} else {
    document.write("Larger number is " + b);
}
</script>
</body>
</html>
