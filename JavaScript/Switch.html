<!DOCTYPE html>
<html>
<head>
<title>Arithmatic Operation</title>
</head>
<body>
<script>
let num1 = Number(prompt("Enter first number"));
let num2 = Number(prompt("Enter second number"));
let op = prompt("Enter operator (+, -, *, /)");
switch (op) {

    case "+":
        document.write(num1 + num2);
        break;

    case "-":
        document.write(num1 - num2);
        break;

    case "*":
        document.write(num1 * num2);
        break;

    case "/":
        document.write(num1 / num2);
        break;

    default:
        document.write("Invalid operator");
}
</script>
</body>
</html>
